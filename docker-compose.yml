services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - customer-website
      - admin-dashboard
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - backend_storage:/var/www/backend/storage:ro
    networks:
      - ecommerce

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ${REGISTRY_IMAGE:-ecommerce}/backend:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - ecommerce
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  queue:
    image: ${REGISTRY_IMAGE:-ecommerce}/backend:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - backend
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - ecommerce

  scheduler:
    image: ${REGISTRY_IMAGE:-ecommerce}/backend:${IMAGE_TAG:-local}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - backend
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - ecommerce

  customer-website:
    build:
      context: .
      dockerfile: customer-website/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
    image: ${REGISTRY_IMAGE:-ecommerce}/customer-website:${IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
    networks:
      - ecommerce

  admin-dashboard:
    build:
      context: .
      dockerfile: admin-dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
        NEXT_PUBLIC_ADMIN_BASE_PATH: ${ADMIN_BASE_PATH:-/admin}
    image: ${REGISTRY_IMAGE:-ecommerce}/admin-dashboard:${IMAGE_TAG:-local}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
      NEXT_PUBLIC_ADMIN_BASE_PATH: ${ADMIN_BASE_PATH:-/admin}
    networks:
      - ecommerce

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ecommerce}
      MYSQL_USER: ${DB_USERNAME:-ecommerce}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD}
    command: ["mysqld", "--defaults-extra-file=/etc/mysql/conf.d/my.cnf"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - ecommerce
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - ecommerce

  backup:
    image: alpine:3.20
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./deployment/backups:/backups
      - ./docker/backup/backup.sh:/usr/local/bin/backup.sh:ro
      - backend_storage:/var/www/html/storage:ro
    entrypoint: ["/bin/sh", "-c"]
    command: "apk add --no-cache mysql-client tar gzip tzdata && echo '0 2 * * * sh /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1' | crontab - && crond -f -l 8"
    networks:
      - ecommerce

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    depends_on:
      - nginx-exporter
      - node-exporter
      - cadvisor
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - ecommerce

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    networks:
      - ecommerce

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://nginx/nginx_status
    depends_on:
      - nginx
    networks:
      - ecommerce

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - ecommerce

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - ecommerce

volumes:
  mysql_data:
  redis_data:
  backend_storage:
  prometheus_data:
  grafana_data:

networks:
  ecommerce:
    driver: bridge
