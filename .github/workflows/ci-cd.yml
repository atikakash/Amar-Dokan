name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Laravel API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, pdo_sqlite, sqlite3, intl, bcmath, zip
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare test env
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run tests
        run: php artisan test

  web:
    name: Next.js Apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [customer-website, admin-dashboard]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run type-check

  mobile:
    name: Flutter App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
